<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrollGui</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
<text x=%2210%22 y=%2270%22 font-size=%2270%22 fill=%22white%22>T</text>
<text x=%2245%22 y=%2270%22 font-size=%2220%22 fill=%2200ffff%22>roll</text>
</svg>">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body {
    background:black;
    color:white;
    overflow:hidden;
}

/* GRID 3D CYBERPUNK */
.grid {
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(#00ffff22 1px, transparent 1px),
    linear-gradient(90deg, #00ffff22 1px, transparent 1px);
    background-size:40px 40px;
    transform: perspective(500px) rotateX(60deg);
    animation: moveGrid 10s linear infinite;
    z-index:-2;
}

@keyframes moveGrid {
    from { background-position:0 0; }
    to { background-position:0 40px; }
}

/* GLOW DO MOUSE */
.glow {
    position:fixed;
    width:300px;
    height:300px;
    background: radial-gradient(circle, #00ffff55, transparent 70%);
    pointer-events:none;
    transform: translate(-50%, -50%);
    z-index:-1;
}

/* NAV */
.navbar {
    padding:20px 50px;
}

.logo .t { font-size:30px; }
.logo .resto { color:#00ffff; font-size:14px; }

/* CENTER */
.center {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card {
    backdrop-filter: blur(15px);
    background: rgba(0,0,0,0.5);
    border:1px solid #00ffff33;
    padding:60px;
    border-radius:20px;
    box-shadow:0 0 50px #00ffff22;
    text-align:center;
}

/* TITLE */
.title {
    font-size:64px;
    margin-bottom:30px;
    text-shadow:0 0 20px #00ffff;
}

/* BUTTON */
.btn {
    position:relative;
    padding:15px 35px;
    border-radius:12px;
    border:1px solid #00ffff88;
    background:transparent;
    color:#00ffff;
    cursor:pointer;
    overflow:hidden;
    transition:0.3s;
}

/* brilho */
.btn::before {
    content:"";
    position:absolute;
    top:0;
    left:-80%;
    width:50%;
    height:100%;
    background:linear-gradient(120deg, transparent, #00ffffaa, transparent);
}

.btn:hover::before {
    animation: brilho 1s forwards;
}

@keyframes brilho {
    to { left:120%; }
}

.btn:hover {
    box-shadow:0 0 20px #00ffff, 0 0 40px #00ffff55;
    transform:scale(1.05);
}

.btn:active {
    background:#00ffff22;
    transform:scale(0.95);
}

/* TOAST */
.toast {
    position:fixed;
    bottom:30px;
    right:30px;
    background:#00ff99;
    color:black;
    padding:15px 25px;
    border-radius:10px;
    opacity:0;
    transform:translateY(20px);
    transition:0.3s;
}

.toast.show {
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<div class="grid"></div>
<div class="glow" id="glow"></div>

<div class="navbar">
    <div class="logo">
        <span class="t">T</span>
        <span class="resto">rollGui</span>
    </div>
</div>

<div class="center">
    <div class="card">
        <div class="title">TrollGui</div>
        <button class="btn" onclick="copiarScript()">Get TrollGui Script</button>
    </div>
</div>

<div id="toast" class="toast">Script copiado!</div>

<audio id="clickSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1f58.mp3">
</audio>

<script>
// CONFIG DO SCRIPT
const scriptParaCopiar = `COLE SEU SCRIPT AQUI`;

// COPY
function copiarScript(){
    navigator.clipboard.writeText(scriptParaCopiar);

    document.getElementById("clickSound").play();

    let toast = document.getElementById("toast");
    toast.classList.add("show");

    setTimeout(()=> toast.classList.remove("show"),3000);
}

// GLOW SEGUINDO MOUSE
document.addEventListener("mousemove", (e)=>{
    const glow = document.getElementById("glow");
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
